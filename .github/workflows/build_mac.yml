name: Build macOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests yfinance mplfinance xlsxwriter lxml html5lib beautifulsoup4 pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile radar_v1.py

    - name: Compress App
      run: |
        cd dist
        zip radar_v1_mac.zip radar_v1

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: radar_mac_app
        path: dist/radar_v1_mac.zip
